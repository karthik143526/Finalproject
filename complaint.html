<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaint</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange:  #ff6b2b;
    --amber:   #ffaa00;
    --red:     #ff3a3a;
    --glow:    rgba(255,107,43,0.35);
    --bg:      #08050a;
    --panel:   #0f0a14;
    --border:  rgba(255,107,43,0.14);
    --text:    #fff0e8;
    --muted:   #6b4a3a;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Exo 2', sans-serif;
    padding: 24px;
    overflow: hidden;
    position: relative;
  }

  /* ── Warning stripe diagonal bg ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: repeating-linear-gradient(
      -55deg,
      transparent,
      transparent 40px,
      rgba(255,107,43,0.022) 40px,
      rgba(255,107,43,0.022) 42px
    );
    pointer-events: none;
  }

  /* ── Radial spotlight ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 65% 55% at 50% 50%, rgba(255,107,43,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── Ambient blobs ── */
  .blob {
    position: fixed; border-radius: 50%;
    filter: blur(85px); pointer-events: none; z-index: 0;
    animation: pulse var(--d,9s) ease-in-out infinite alternate;
  }
  .b1 { width:380px;height:380px; background:rgba(255,107,43,0.1);  top:-100px; right:-80px; --d:9s;  }
  .b2 { width:280px;height:280px; background:rgba(255,58,58,0.08);   bottom:-70px; left:-60px; --d:12s; animation-delay:3s; }
  @keyframes pulse { from{transform:scale(1)} to{transform:scale(1.18)} }

  /* ── Floating warning particles ── */
  .pts { position:fixed; inset:0; pointer-events:none; z-index:1; }
  .pt {
    position:absolute; font-size:var(--fs,12px);
    opacity:0; animation:rise var(--d,12s) var(--dl,0s) infinite linear;
  }
  @keyframes rise {
    0%   { opacity:0; transform:translateY(105vh) rotate(0deg); }
    10%  { opacity:.4; }
    85%  { opacity:.15; }
    100% { opacity:0; transform:translateY(-40px) rotate(var(--r,180deg)); }
  }

  /* ── Card ── */
  .card {
    position:relative; z-index:5;
    width:100%; max-width:460px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:22px;
    padding:50px 42px 42px;
    box-shadow:
      0 0 0 1px rgba(255,107,43,0.04),
      0 4px 8px rgba(0,0,0,0.5),
      0 32px 90px rgba(0,0,0,0.75),
      inset 0 1px 0 rgba(255,255,255,0.04);
    animation: cardIn .85s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes cardIn {
    from { opacity:0; transform:translateY(40px) scale(.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  /* HUD corners */
  .card::before,.card::after,.c-br,.c-bl {
    content:''; position:absolute;
    width:22px; height:22px;
    border-color:var(--orange); border-style:solid;
  }
  .card::before { top:-1px; left:-1px;  border-width:2px 0 0 2px; }
  .card::after  { top:-1px; right:-1px; border-width:2px 2px 0 0; }
  .c-br { bottom:-1px; right:-1px; border-width:0 2px 2px 0; }
  .c-bl { bottom:-1px; left:-1px;  border-width:0 0 2px 2px; }

  /* top glow bar */
  .top-bar {
    position:absolute; top:0; left:50px; right:50px; height:2px;
    background:linear-gradient(90deg,transparent,var(--orange),var(--amber),transparent);
    border-radius:0 0 4px 4px;
  }

  /* ── Header ── */
  .header { margin-bottom:30px; animation:fadeUp .7s .1s both; }

  .alert-tag {
    display:inline-flex; align-items:center; gap:8px;
    font-family:'Orbitron',monospace;
    font-size:9px; font-weight:700; letter-spacing:.25em; text-transform:uppercase;
    color:var(--orange); border:1px solid var(--border);
    padding:5px 14px; border-radius:2px; margin-bottom:16px;
  }
  .alert-dot {
    width:7px; height:7px; border-radius:50%;
    background:var(--orange); box-shadow:0 0 8px var(--orange);
    animation:blink 1.4s ease-in-out infinite;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

  h1 {
    font-family:'Orbitron',monospace;
    font-size:24px; font-weight:900;
    color:var(--text); line-height:1.15; letter-spacing:-.01em;
  }
  h1 em {
    font-style:normal;
    background:linear-gradient(100deg,var(--orange),var(--amber));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .sub { margin-top:7px; font-size:12.5px; color:var(--muted); line-height:1.55; }

  /* ── Fields ── */
  .row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

  .field { margin-bottom:15px; animation:fadeUp .7s both; }
  .field:nth-child(1){animation-delay:.26s}
  .field:nth-child(2){animation-delay:.33s}
  .field:nth-child(3){animation-delay:.40s}
  .field:nth-child(4){animation-delay:.47s}

  label {
    display:flex; align-items:center; gap:6px;
    font-size:10px; font-weight:600;
    font-family:'Orbitron',monospace;
    letter-spacing:.1em; text-transform:uppercase;
    color:var(--muted); margin-bottom:8px;
  }

  /* ✅ ORIGINAL INPUTS — only styled, no logic change */
  input[type="text"], select, textarea {
    width:100%;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:10px;
    color:var(--text);
    font-family:'Exo 2',sans-serif;
    font-size:14px; font-weight:400;
    outline:none; appearance:none;
    transition:border-color .25s, box-shadow .25s, background .25s;
  }
  input[type="text"] { padding:13px 16px; }
  input::placeholder { color:rgba(107,74,58,0.85); }

  input[type="text"]:focus, select:focus, textarea:focus {
    border-color:rgba(255,107,43,0.5);
    background:rgba(255,107,43,0.04);
    box-shadow:0 0 0 3px rgba(255,107,43,0.1), 0 0 20px rgba(255,107,43,0.06);
  }

  /* select styling */
  .sel-wrap { position:relative; }
  .sel-wrap::after {
    content:'▾'; position:absolute;
    right:14px; top:50%; transform:translateY(-50%);
    color:var(--muted); pointer-events:none; font-size:13px;
  }
  select { padding:13px 36px 13px 16px; cursor:pointer; }
  select option { background:#0f0a14; }

  /* textarea */
  textarea {
    padding:13px 16px;
    resize:vertical; min-height:110px; line-height:1.6;
    display:block;
  }
  textarea::placeholder { color:rgba(107,74,58,0.85); }

  /* ── Divider ── */
  .divider {
    height:1px;
    background:linear-gradient(90deg,transparent,var(--border),transparent);
    margin:22px 0;
  }

  /* ── Buttons — same actions, upgraded look ── */
  /* ✅ ORIGINAL SUBMIT — posts to complaint.php */
  button[type="submit"] {
    width:100%; padding:15px;
    background:linear-gradient(135deg,var(--orange),var(--amber));
    color:#1a0800; border:none; border-radius:12px;
    font-family:'Orbitron',monospace;
    font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
    cursor:pointer; position:relative; overflow:hidden;
    transition:transform .2s, box-shadow .2s;
    animation:fadeUp .7s .56s both;
  }
  button[type="submit"]::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent);
    transform:translateX(-100%); transition:transform .55s ease;
  }
  button[type="submit"]:hover { transform:translateY(-2px); box-shadow:0 10px 36px rgba(255,107,43,0.45); }
  button[type="submit"]:hover::before { transform:translateX(100%); }
  button[type="submit"]:active { transform:translateY(0); }

  /* ✅ ORIGINAL BACK BTN — onclick='dashboard.html' untouched */
  .back-btn {
    width:100%; padding:13px;
    background:transparent;
    border:1px solid rgba(255,255,255,0.07);
    border-radius:12px; color:var(--muted);
    font-family:'Orbitron',monospace;
    font-size:10px; font-weight:700; letter-spacing:.08em;
    cursor:pointer; margin-top:10px;
    transition:color .2s, border-color .2s, background .2s;
    animation:fadeUp .7s .63s both;
  }
  .back-btn:hover { color:var(--text); border-color:rgba(255,107,43,0.3); background:rgba(255,107,43,0.05); }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  @media(max-width:480px){
    .card { padding:38px 22px 28px; }
    .row  { grid-template-columns:1fr; }
    h1    { font-size:20px; }
  }
</style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>

<!-- Floating warning symbols -->
<div class="pts" id="pts"></div>

<div class="card">
  <span class="c-br"></span>
  <span class="c-bl"></span>
  <div class="top-bar"></div>

  <div class="header">
    <div class="alert-tag"><span class="alert-dot"></span> Issue Report</div>
    <h1>Raise a <em>Complaint</em></h1>
    <p class="sub">Submit your concern and we'll resolve it fast.</p>
  </div>

  <!-- ✅ ORIGINAL FORM — action & method untouched -->
  <form action="complaint.php" method="POST">

    <div class="row">
      <div class="field">
        <label>👤 Name</label>
        <!-- ✅ ORIGINAL INPUT -->
        <input type="text" name="name" placeholder="Enter Name" required>
      </div>
      <div class="field">
        <label>📞 Phone</label>
        <!-- ✅ ORIGINAL INPUT -->
        <input type="text" name="phone" placeholder="Phone Number" required>
      </div>
    </div>

    <div class="field">
      <label>⚠️ Issue Type</label>
      <!-- ✅ ORIGINAL SELECT — all options intact -->
      <div class="sel-wrap">
        <select name="type">
          <option>Missed Pickup</option>
          <option>Late Service</option>
          <option>Bad Behaviour</option>
          <option>Other Issue</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>📝 Description</label>
      <!-- ✅ ORIGINAL TEXTAREA -->
      <textarea name="message" placeholder="Describe your issue..." required></textarea>
    </div>

    <div class="divider"></div>

    <!-- ✅ ORIGINAL SUBMIT BUTTON -->
    <button type="submit">⚡ &nbsp;Submit Complaint</button>

  </form>

  <!-- ✅ ORIGINAL BACK BUTTON — onclick untouched -->
  <button class="back-btn" onclick="window.location.href='dashboard.html'">
    ← Go Back
  </button>

</div>

<script>
  // Floating ⚠ particles — purely decorative
  const syms = ['⚠', '!', '▲'];
  const c = document.getElementById('pts');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'pt';
    p.textContent = syms[Math.floor(Math.random() * syms.length)];
    p.style.cssText = `
      left:${Math.random() * 100}%;
      top:100%;
      --fs:${8 + Math.random() * 8}px;
      --d:${10 + Math.random() * 12}s;
      --dl:${Math.random() * 10}s;
      --r:${(Math.random() > .5 ? '' : '-')}${90 + Math.floor(Math.random()*270)}deg;
    `;
    c.appendChild(p);
  }
</script>

</body>
</html>
