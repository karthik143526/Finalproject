<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Track Request</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

/* 🌌 Animated Background */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
    background-size:600% 600%;
    animation:bgMove 10s ease infinite;
    color:white;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ✨ Glow circles */
.circle{
    position:absolute;
    border-radius:50%;
    filter:blur(60px);
    opacity:0.4;
    pointer-events:none; /* ✅ FIX */
}
.circle1{width:200px;height:200px;background:#00ffcc;top:10%;left:10%;}
.circle2{width:150px;height:150px;background:#00ccff;bottom:10%;right:10%;}

/* 💎 Glass container */
.container{
    position:relative;
    background:rgba(255,255,255,0.08);
    padding:40px;
    border-radius:20px;
    width:350px;
    text-align:center;
    backdrop-filter:blur(15px);
    box-shadow:0 10px 50px rgba(0,0,0,0.7);
}

/* Glow border */
.container::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:20px;
    padding:2px;
    background:linear-gradient(45deg,#00ffcc,#00ff99,#00ccff);
    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
            mask-composite:exclude;
    pointer-events:none; /* ✅ FIX */
}

/* Title */
h2{
    color:#00ffcc;
    margin-bottom:20px;
    text-shadow:0 0 10px #00ffcc;
}

/* Input */
input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:rgba(0,0,0,0.6);
    color:white;
    outline:none;
    position:relative;
    z-index:2; /* ✅ FIX */
}

input::placeholder{
    color:#ccc;
}

input:focus{
    box-shadow:0 0 10px #00ffcc;
}

/* Buttons */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:25px;
    background:#00ffcc;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #00ffcc;
}

/* Back button */
.back{
    background:#333;
    color:white;
}
</style>
</head>

<body>

<!-- Glow effects -->
<div class="circle circle1"></div>
<div class="circle circle2"></div>

<div class="container">

<h2>📍 Track Your Request</h2>

<form action="tracking.php" method="POST">
    <input type="text" name="tracking_id" placeholder="Enter Phone Number" required>
    <button type="submit">Track 🚀</button>
</form>

<button class="back" onclick="window.location.href='dashboard.html'">
    ⬅ Go Back
</button>

</div>

</body>
</html>
