name: PHP + Selenium + Security Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # PHP Setup
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      # PHP Syntax Check
      - name: Check PHP Syntax
        run: |
          find . -name "*.php" -exec php -l {} \;

      # Python Setup
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install Dependencies
      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install selenium openpyxl webdriver-manager requests

      # Run Selenium Tests
      - name: Run Selenium Script
        run: |
          python selenium_e2e.py

      # Upload Selenium Report
      - name: Upload Excel Report
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report
          path: selenium_test_cases.xlsx

      # Trivy Security Scan
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .

      # Upload Trivy Report
      - name: Upload Trivy Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: .