name: PHP Check

on:
  push:
    branches:
      - main

jobs:
  php-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Check PHP Syntax
        run: find . -name "*.php" -exec php -l {} \;