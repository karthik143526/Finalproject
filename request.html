<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waste Pickup Request</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan:   #06efd4;
    --teal:   #0ee8c8;
    --blue:   #0ea5e9;
    --glow:   rgba(6,239,212,0.3);
    --bg:     #030c0b;
    --panel:  #071410;
    --border: rgba(6,239,212,0.12);
    --text:   #e0faf6;
    --muted:  #2e5e58;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 24px;
    overflow: hidden;
    position: relative;
  }

  /* ── Circuit-board grid ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(6,239,212,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(6,239,212,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── Ambient glow blobs ── */
  .blob {
    position: fixed; border-radius: 50%;
    filter: blur(90px); pointer-events: none; z-index: 0;
  }
  .b1 { width:400px;height:400px; background:rgba(6,239,212,0.08); top:-100px; left:-80px; animation:pulse 9s ease-in-out infinite alternate; }
  .b2 { width:300px;height:300px; background:rgba(14,165,233,0.07); bottom:-80px; right:-60px; animation:pulse 11s 2s ease-in-out infinite alternate-reverse; }
  @keyframes pulse { from{transform:scale(1)} to{transform:scale(1.2)} }

  /* ── Scan line ── */
  .scan {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(6,239,212,0.015) 3px, rgba(6,239,212,0.015) 4px);
    pointer-events: none; z-index: 1;
  }

  /* ── Floating particles ── */
  .pts { position:fixed; inset:0; pointer-events:none; z-index:1; }
  .pt {
    position: absolute; border-radius: 50%;
    background: var(--cyan); opacity: 0;
    animation: rise var(--d,10s) var(--dl,0s) infinite ease-in-out;
  }
  @keyframes rise {
    0%   { opacity:0; transform:translateY(100vh) scale(0); }
    10%  { opacity:.5; }
    90%  { opacity:.15; }
    100% { opacity:0; transform:translateY(-40px) scale(1) translateX(var(--dx,0px)); }
  }

  /* ── Card ── */
  .card {
    position: relative; z-index: 5;
    width: 100%; max-width: 460px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px 40px;
    box-shadow:
      0 0 0 1px rgba(6,239,212,0.04),
      0 2px 6px rgba(0,0,0,0.5),
      0 28px 80px rgba(0,0,0,0.75),
      inset 0 1px 0 rgba(255,255,255,0.04);
    animation: cardIn .85s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes cardIn {
    from { opacity:0; transform:translateY(36px) scale(.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  /* corner HUD brackets */
  .card::before,.card::after,.hud-br,.hud-bl {
    content:''; position:absolute;
    width:20px; height:20px;
    border-color:var(--cyan); border-style:solid;
  }
  .card::before { top:-1px;  left:-1px;  border-width:2px 0 0 2px; }
  .card::after  { top:-1px;  right:-1px; border-width:2px 2px 0 0; }
  .hud-br { bottom:-1px; right:-1px; border-width:0 2px 2px 0; }
  .hud-bl { bottom:-1px; left:-1px;  border-width:0 0 2px 2px; }

  /* top glow line */
  .card .top-line {
    position:absolute; top:0; left:50px; right:50px; height:2px;
    background:linear-gradient(90deg,transparent,var(--cyan),var(--blue),transparent);
    border-radius:0 0 4px 4px;
  }

  /* ── Header ── */
  .header { margin-bottom:32px; animation:fadeUp .7s .1s both; }

  .hud-badge {
    display:inline-flex; align-items:center; gap:8px;
    font-family:'Unbounded',sans-serif;
    font-size:9px; font-weight:700; letter-spacing:.25em;
    text-transform:uppercase; color:var(--cyan);
    border:1px solid var(--border);
    padding:6px 14px; border-radius:2px; margin-bottom:16px;
  }
  .hud-dot {
    width:6px;height:6px;border-radius:50%;
    background:var(--cyan); box-shadow:0 0 8px var(--cyan);
    animation:blink 1.5s ease-in-out infinite;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

  h1 {
    font-family:'Unbounded',sans-serif;
    font-size:22px; font-weight:900;
    color:var(--text); line-height:1.2;
    letter-spacing:-.01em;
  }
  h1 span {
    background:linear-gradient(90deg,var(--cyan),var(--blue));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .sub { margin-top:6px; font-size:12.5px; color:var(--muted); line-height:1.55; }

  /* ── Fields ── */
  .row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

  .field { margin-bottom:16px; animation:fadeUp .7s both; }
  .field:nth-child(1){animation-delay:.25s}
  .field:nth-child(2){animation-delay:.32s}
  .field:nth-child(3){animation-delay:.39s}
  .field:nth-child(4){animation-delay:.46s}
  .field:nth-child(5){animation-delay:.53s}

  label {
    display:flex; align-items:center; gap:6px;
    font-size:10px; font-weight:700;
    font-family:'Unbounded',sans-serif;
    letter-spacing:.1em; text-transform:uppercase;
    color:var(--muted); margin-bottom:8px;
  }

  /* THE ORIGINAL INPUTS — logic untouched, only styled */
  input[type="text"],
  input[type="tel"],
  input[type="date"],
  select {
    width:100%;
    background:rgba(6,239,212,0.03);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:10px;
    color:var(--text);
    font-family:'DM Sans',sans-serif;
    font-size:14px; font-weight:400;
    outline:none;
    appearance:none;
    transition:border-color .25s, box-shadow .25s, background .25s;
    padding:13px 16px;
  }
  input::placeholder { color:rgba(46,94,88,0.9); }
  input[type="date"] { color:var(--muted); }
  input[type="date"]:valid { color:var(--text); }

  input:focus, select:focus {
    border-color:rgba(6,239,212,0.5);
    background:rgba(6,239,212,0.05);
    box-shadow:0 0 0 3px rgba(6,239,212,0.1), 0 0 18px rgba(6,239,212,0.07);
  }

  /* select wrapper for custom arrow */
  .sel-wrap { position:relative; }
  .sel-wrap::after {
    content:'▾'; position:absolute;
    right:14px; top:50%; transform:translateY(-50%);
    color:var(--muted); pointer-events:none; font-size:13px;
  }
  select { cursor:pointer; padding-right:36px; }
  select option { background:#071410; }

  /* date icon wrapper */
  .date-wrap { position:relative; }
  .date-wrap .dicon {
    position:absolute; left:13px; top:50%;
    transform:translateY(-50%);
    font-size:15px; pointer-events:none;
  }
  .date-wrap input { padding-left:40px; }

  /* ── Divider ── */
  .divider {
    height:1px;
    background:linear-gradient(90deg,transparent,var(--border),transparent);
    margin:22px 0;
  }

  /* ── Buttons — SAME actions, new look ── */
  .submit-btn {
    width:100%; padding:15px;
    background:linear-gradient(135deg,var(--cyan),var(--blue));
    color:#021a18; border:none; border-radius:12px;
    font-family:'Unbounded',sans-serif;
    font-size:12px; font-weight:700; letter-spacing:.1em;
    text-transform:uppercase; cursor:pointer;
    position:relative; overflow:hidden;
    transition:transform .2s, box-shadow .2s;
    animation:fadeUp .7s .58s both;
  }
  .submit-btn::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent);
    transform:translateX(-100%); transition:transform .55s ease;
  }
  .submit-btn:hover { transform:translateY(-2px); box-shadow:0 10px 36px rgba(6,239,212,0.4); }
  .submit-btn:hover::before { transform:translateX(100%); }
  .submit-btn:active { transform:translateY(0); }

  .back-btn {
    width:100%; padding:13px;
    background:transparent;
    border:1px solid rgba(255,255,255,0.07);
    border-radius:12px; color:var(--muted);
    font-family:'Unbounded',sans-serif;
    font-size:10px; font-weight:700; letter-spacing:.08em;
    cursor:pointer; margin-top:10px;
    transition:color .2s, border-color .2s, background .2s;
    animation:fadeUp .7s .64s both;
  }
  .back-btn:hover { color:var(--text); border-color:rgba(6,239,212,0.3); background:rgba(6,239,212,0.04); }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  @media(max-width:480px){
    .card { padding:36px 22px 28px; }
    .row  { grid-template-columns:1fr; }
    h1    { font-size:18px; }
  }
</style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="scan"></div>
<div class="pts" id="pts"></div>

<div class="card">
  <span class="hud-br"></span>
  <span class="hud-bl"></span>
  <div class="top-line"></div>

  <div class="header">
    <div class="hud-badge"><span class="hud-dot"></span>Collection System</div>
    <h1>Waste <span>Pickup</span><br>Request</h1>
    <p class="sub">Schedule a doorstep collection in seconds.</p>
  </div>

  <!-- ✅ ORIGINAL FORM — action & method unchanged -->
  <form action="request.php" method="POST">

    <div class="row">
      <div class="field">
        <label>👤 Name</label>
        <input type="text" name="name" placeholder="Full name" required>
      </div>
      <div class="field">
        <label>📞 Phone</label>
        <input type="tel" name="phone" placeholder="10 digits"
               pattern="[0-9]{10}" maxlength="10" required>
      </div>
    </div>

    <div class="field">
      <label>📍 Address</label>
      <input type="text" name="address" placeholder="Street, area, city…" required>
    </div>

    <div class="field">
      <label>🗑 Waste Type</label>
      <div class="sel-wrap">
        <!-- ✅ ORIGINAL SELECT — options untouched -->
        <select name="waste_type">
          <option>Dry Waste</option>
          <option>Wet Waste</option>
          <option>Plastic</option>
          <option>Mixed Waste</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>📅 Pickup Date</label>
      <div class="date-wrap">
        <span class="dicon">📅</span>
        <!-- ✅ ORIGINAL DATE INPUT — required untouched -->
        <input type="date" name="pickup_date" id="pickupDate" required>
      </div>
    </div>

    <div class="divider"></div>

    <!-- ✅ ORIGINAL SUBMIT — action goes to request.php -->
    <button type="submit" class="submit-btn">🚀 &nbsp;Submit Request</button>

  </form>

  <!-- ✅ ORIGINAL BACK BUTTON — href unchanged -->
  <button class="back-btn" onclick="window.location.href='dashboard.html'">
    ← Go Back
  </button>

</div>


<script>
  // Set min date = today (UX only, doesn't change form logic)
  document.getElementById('pickupDate').min = new Date().toISOString().split('T')[0];

  // Floating particles
  const c = document.getElementById('pts');
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'pt';
    const sz = Math.random() > .7 ? 3 : 2;
    p.style.cssText = `
      left:${Math.random()*100}%;
      width:${sz}px; height:${sz}px;
      --d:${8+Math.random()*10}s;
      --dl:${Math.random()*8}s;
      --dx:${(Math.random()-.5)*80}px;
    `;
    c.appendChild(p);
  }
</script>

</body>
</html>
