<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Get Started - EcoWaste</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

/* 🌌 Animated Background */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
    background-size:600% 600%;
    animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ✨ Floating circles */
.circle{
    position:absolute;
    border-radius:50%;
    filter:blur(60px);
    opacity:0.4;
    animation:float 6s infinite alternate;
}

.circle1{width:200px;height:200px;background:#00ffcc;top:10%;left:10%;}
.circle2{width:150px;height:150px;background:#00ccff;bottom:10%;right:10%;}
.circle3{width:120px;height:120px;background:#00ff99;top:60%;left:30%;}

@keyframes float{
    from{transform:translateY(0);}
    to{transform:translateY(-40px);}
}

/* 💎 Container */
.container{
    position:relative;
    text-align:center;
    background:rgba(255,255,255,0.08);
    padding:50px;
    border-radius:20px;
    width:420px;
    backdrop-filter:blur(20px);
    box-shadow:0 10px 50px rgba(0,0,0,0.7);
    color:white;
}

/* Title */
.title{
    color:#00ffcc;
    margin-bottom:15px;
    font-size:24px;
}

/* Text */
p{
    font-size:15px;
    margin-bottom:20px;
}

/* Steps */
.steps{
    text-align:left;
    margin-bottom:25px;
}

.steps li{
    margin:10px 0;
}

/* Buttons */
a{
    text-decoration:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:25px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

/* Styles */
.register{
    background:#00ffcc;
    color:black;
}

.login{
    background:white;
    color:black;
}

.back{
    background:#333;
    color:white;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #00ffcc;
}
</style>
</head>

<body>

<!-- Background effects -->
<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>

<div class="container">

    <div class="title">Welcome to EcoWaste 🌱</div>

    <p>
        Smart waste management system to make your city clean and green.
    </p>

    <ul class="steps">
        <li>✔ Step 1: Register your account</li>
        <li>✔ Step 2: Login to system</li>
        <li>✔ Step 3: Request pickup easily</li>
    </ul>

    <!-- ✅ FIXED BUTTONS -->
    <a href="register.html">
        <button class="register">Register Now 🚀</button>
    </a>

    <a href="login.html">
        <button class="login">Login Now 🔐</button>
    </a>

    <a href="index.html">
        <button class="back">Go Back</button>
    </a>

</div>

</body>
</html>
