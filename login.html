<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>EcoWaste Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0d110a;overflow:hidden;color:#fff}
body{display:flex;height:100vh}
.left,.right{flex:1;position:relative}
.left{display:flex;align-items:flex-end;padding:60px;background:
linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.7)),
linear-gradient(135deg,#10160c,#1d2914)}
.grid{position:absolute;inset:0;background:
linear-gradient(rgba(200,245,58,.05) 1px,transparent 1px),
linear-gradient(90deg,rgba(200,245,58,.05) 1px,transparent 1px);
background-size:40px 40px;animation:grid 12s linear infinite}
@keyframes grid{to{background-position:40px 40px}}
.orb{position:absolute;width:350px;height:350px;border-radius:50%;
background:radial-gradient(circle,#c8f53a33,transparent 70%);
top:-80px;right:-80px;animation:float 6s ease-in-out infinite alternate}
@keyframes float{to{transform:translate(-30px,30px) scale(1.1)}}
.card{position:absolute;background:#161d13dd;padding:12px 18px;border-radius:10px;
border:1px solid #3c4d2e;animation:updown 4s ease-in-out infinite}
.card:nth-child(3){top:20%;left:10%}
.card:nth-child(4){top:40%;right:8%;animation-delay:1s}
.card:nth-child(5){top:62%;left:18%;animation-delay:2s}
@keyframes updown{50%{transform:translateY(-10px)}}
.content{position:relative;z-index:2}
h1{font-size:52px;color:#fff} h1 span{color:#c8f53a}
p{margin-top:15px;color:#cfcfcf;max-width:400px;line-height:1.6}
.right{display:flex;justify-content:center;align-items:center;background:#151b11}
.box{width:360px;background:#1b2416;padding:35px;border-radius:15px;
box-shadow:0 0 25px #0006;animation:fade .8s}
@keyframes fade{from{opacity:0;transform:translateY(20px)}to{opacity:1}}
.box h2{text-align:center;color:#c8f53a;margin-bottom:8px}
.box p{text-align:center;margin-bottom:20px;color:#aaa}
label{display:block;margin:10px 0 6px}
.wrap{position:relative}
input{width:100%;padding:12px 42px 12px 12px;border:1px solid #45553a;
background:#222b1b;color:#fff;border-radius:8px}
input:focus{outline:none;border-color:#c8f53a}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);
cursor:pointer;font-size:18px}
button{width:100%;padding:12px;margin-top:20px;border:none;border-radius:8px;
background:#c8f53a;font-weight:bold;cursor:pointer}
button:hover{background:#e7ff8a}
.links{display:flex;justify-content:space-between;margin-top:15px}
.links a{color:#c8f53a;text-decoration:none}
.cursor,.ring{position:fixed;border-radius:50%;pointer-events:none;z-index:999}
.cursor{width:8px;height:8px;background:#c8f53a}
.ring{width:30px;height:30px;border:1px solid #c8f53a88}
@media(max-width:800px){.left{display:none}.right{flex:1}}
</style>
</head>
<body>
<div class="cursor" id="c"></div><div class="ring" id="r"></div>
<div class="left">
<div class="grid"></div><div class="orb"></div>
<div class="card">♻️ Recycling 85%</div>
<div class="card">🚛 Fuel Saved 40%</div>
<div class="card">🌍 120+ Cities</div>
<div class="content">
<h1>Track.<br>Reduce.<br><span>Sustain.</span></h1>
<p>Manage your waste pickups and keep your city clean with EcoWaste.</p>
</div></div>
<div class="right"><div class="box">
<h2>EcoWaste</h2><p>Sign in to continue</p>
<form action="login.php" method="POST">
<label>Email</label>
<div class="wrap"><input type="email" name="email" required></div>
<label>Password</label>
<div class="wrap">
<input type="password" id="password" name="password" required>
<span class="eye" id="eye" onclick="togglePassword()">👁️</span>
</div>
<button type="submit">Login</button>
<div class="links">
<a href="forgot_password.html">Forgot Password?</a>
<a href="register.html">Register</a>
</div>
</form>
</div></div>
<script>
function togglePassword(){
let p=document.getElementById('password'),e=document.getElementById('eye');
if(p.type==='password'){p.type='text';e.textContent='🙈';}
else{p.type='password';e.textContent='👁️';}
}
let c=document.getElementById('c'),r=document.getElementById('r'),mx=0,my=0,rx=0,ry=0;
document.onmousemove=e=>{mx=e.clientX;my=e.clientY}
(function f(){rx+=(mx-rx)*.15;ry+=(my-ry)*.15;
c.style.transform=`translate(${mx-4}px,${my-4}px)`;
r.style.transform=`translate(${rx-15}px,${ry-15}px)`;
requestAnimationFrame(f)})();
</script>
</body></html>
